<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATech | Laborator 4 - CGI Server</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f4f9; color: #1a1a1a; }
        header { background-color: #1a1a1a; color: white; padding: 20px; text-align: center; }
        .meniu-cuprins { background-color: #222222; padding: 12px 0; text-align: center; }
        .meniu-cuprins a { color: #007bff; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .phone-card { background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 15px; padding: 20px; width: 250px; text-align: center; }
        .price { color: #27ae60; font-weight: bold; font-size: 1.2rem; }
        
        /* Formular */
        .formular-sectiune { background: white; max-width: 500px; margin: 30px auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-trimite { width: 100%; background-color: #e67e22; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .btn-trimite:hover { background-color: #d35400; }
        footer { text-align: center; padding: 20px; background: #1a1a1a; color: white; margin-top: 40px; }
    </style>
</head>
<body>

<header>
    <h1>ATech Store</h1>
    <p>Laboratorul Nr. 4 - Trimitere date către server CGI</p>
</header>

<nav class="meniu-cuprins">
    <a href="#produse">Produse</a>
    <a href="#comanda">Formular CGI</a>
</nav>

<div class="formular-sectiune" id="comanda">
    <h2>Trimite Comanda pe Server</h2>
    
    <form action="/cgi-bin/procesare.py" method="POST" onsubmit="return valideazaDatele()">
        <div class="form-group">
            <label for="nume">Numele complet:</label>
            <input type="text" id="nume" name="nume_client" placeholder="Ex: Turea Nechita">
        </div>
        
        <div class="form-group">
            <label for="telefon">Alege Modelul:</label>
            <select id="telefon" name="model_telefon">
                <option value="ATech Pro Max">ATech Pro Max - 4500 RON</option>
                <option value="ATech Air">ATech Air - 3200 RON</option>
                <option value="ATech Lite">ATech Lite - 1800 RON</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="cantitate">Cantitate:</label>
            <input type="number" id="cantitate" name="cantitate_produse" value="1">
        </div>
        
        <button type="submit" class="btn-trimite">Trimite la Server CGI</button>
    </form>
</div>

<footer>
    <p>&copy; 2026 ATech Romania. Proiect structurat pentru Laboratorul 4 (CGI Backend).</p>
</footer>

<script>
    function valideazaDatele() {
        let nume = document.getElementById('nume').value.trim();
        let cantitate = parseInt(document.getElementById('cantitate').value);

        // Verificăm dacă numele este gol
        if (nume === "") {
            alert("Eroare: Trebuie să introduceți numele dumneavoastră!");
            return false; // Oprește trimiterea datelor la server
        }

        // Verificăm dacă numele este prea scurt (ex: mai mic de 3 caractere)
        if (nume.length < 3) {
            alert("Eroare: Numele introdus este prea scurt!");
            return false;
        }

        // Verificăm dacă cantitatea este corectă
        if (isNaN(cantitate) || cantitate <= 0) {
            alert("Eroare: Cantitatea trebuie să fie un număr mai mare decât 0!");
            return false; // Oprește trimiterea
        }

        // Dacă totul e corect, lăsăm formularul să fie trimis
        return true;
    }
</script>

</body>
</html>
